version: '3.8'
services:
  act-generator:
    build: .
    container_name: act-generator
    restart: unless-stopped
    volumes:
      - ./volumes/outputs:/app/volumes/outputs
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: act-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - act-generator
    networks:
      - app-net

networks:
  app-net:
    driver: bridge