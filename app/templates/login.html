<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Акт Списания ГКУ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 400px; width: 100%; }
  </style>
</head>
<body>
  <div class="login-card card shadow-sm p-4">
    <h3 class="text-center mb-4">🔐 Авторизация</h3>
    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
  </div>
</body>
</html>
